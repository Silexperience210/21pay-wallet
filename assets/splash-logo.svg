<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="boltGradSplashLogo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F7931A"/>
      <stop offset="100%" stop-color="#FFAE42"/>
    </linearGradient>
    <filter id="glowSplashLogo" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Badge -->
  <rect x="56" y="56" width="400" height="400" rx="112" ry="112"
        fill="#0A0A0A" stroke="url(#boltGradSplashLogo)" stroke-width="6"
        filter="url(#glowSplashLogo)"/>

  <!-- Lightning bolt -->
  <path d="M 281 126 L 191 280 L 250 280 L 234 386 L 324 232 L 265 232 Z"
        fill="url(#boltGradSplashLogo)" filter="url(#glowSplashLogo)"/>

  <!-- 21 text -->
  <text x="256" y="302"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="900"
        font-size="110"
        fill="#050505"
        letter-spacing="-4">21</text>
</svg>