<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="boltGradAdaptive" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F7931A"/>
      <stop offset="100%" stop-color="#FFAE42"/>
    </linearGradient>
    <filter id="glowAdaptive" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Transparent background -->

  <!-- Lightning bolt -->
  <path d="M 562 252 L 382 560 L 500 560 L 462 772 L 642 464 L 524 464 Z"
        fill="url(#boltGradAdaptive)" filter="url(#glowAdaptive)"/>

  <!-- 21 text -->
  <text x="512" y="604"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="900"
        font-size="220"
        fill="#050505"
        letter-spacing="-8">21</text>
</svg>