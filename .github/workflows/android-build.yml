name: android-build

# Direct-distribution build (NOT Google Play). Produces a signed APK via EAS cloud
# build. Auth uses the EXPO_TOKEN GitHub secret only — never echoed, never committed.

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production
  push:
    tags:
      - 'apk-*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release + upload the APK
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # The signing keystore is gitignored — restore it (+ credentials.json) from
      # secrets so `credentialsSource: local` builds sign with the SAME keystore as
      # local builds. Files are written outside the repo tree's tracked paths.
      - name: Restore Android signing credentials
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          CREDENTIALS_JSON: ${{ secrets.CREDENTIALS_JSON }}
        run: |
          mkdir -p credentials
          echo "$ANDROID_KEYSTORE_B64" | base64 -d > credentials/release.keystore
          printf '%s' "$CREDENTIALS_JSON" > credentials.json

      # Wait for the EAS build to finish and capture the signed artifact URL.
      - name: Build APK on EAS (wait for completion)
        id: eas
        run: |
          npx eas-cli build \
            --platform android \
            --profile "${{ github.event.inputs.profile || 'preview' }}" \
            --non-interactive --json > build.json
          URL=$(jq -r '.[0].artifacts.applicationArchiveUrl // .[0].artifacts.buildUrl' build.json)
          echo "Artifact URL: $URL"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Download the signed APK
        run: curl -fL -o "21pay-${{ github.ref_name }}.apk" "${{ steps.eas.outputs.url }}"

      # On an apk-* tag, publish the APK as a GitHub Release (skipped for manual runs).
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/apk-')
        uses: softprops/action-gh-release@v2
        with:
          name: 21pay ${{ github.ref_name }}
          files: 21pay-${{ github.ref_name }}.apk
          generate_release_notes: true
