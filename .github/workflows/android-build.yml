name: android-build

# Direct-distribution build (NOT Google Play). Builds the release APK with plain
# Gradle on the runner (no EAS — the free-plan build quota made cloud builds
# unreliable) and signs it with the SAME release keystore as before (restored from
# secrets, so installed apps keep updating in place). Secrets are never echoed.

on:
  workflow_dispatch:
  push:
    tags:
      - 'apk-*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release + upload the APK
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      # The signing keystore is gitignored — restore it (+ credentials.json) from
      # secrets. Same keystore as every prior release: in-place updates keep working.
      - name: Restore Android signing credentials
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          CREDENTIALS_JSON: ${{ secrets.CREDENTIALS_JSON }}
        run: |
          mkdir -p credentials
          echo "$ANDROID_KEYSTORE_B64" | base64 -d > credentials/release.keystore
          printf '%s' "$CREDENTIALS_JSON" > credentials.json

      # EXPO_PUBLIC_* used to be injected by the EAS "preview" profile. Metro inlines
      # them at JS-bundle time (inside Gradle), so they MUST be in the environment —
      # without them the feature gate fails closed and every section entry vanishes.
      # eas.json stays the single source of truth.
      - name: Export EXPO_PUBLIC env from eas.json
        run: |
          jq -r '.build.preview.env | to_entries[] | "\(.key)=\(.value)"' eas.json >> "$GITHUB_ENV"
          jq -r '.build.preview.env | keys[]' eas.json

      # Keep the Android versionCode monotonic (run number) and the versionName in
      # sync with app.config.ts — the committed android/ has static placeholders.
      - name: Sync version into Gradle
        run: |
          VER=$(grep -oP "version: '\K[^']+" app.config.ts)
          echo "App version: $VER (code ${{ github.run_number }})"
          sed -i "s/versionCode 1$/versionCode ${{ github.run_number }}/" android/app/build.gradle
          sed -i "s/versionName \"0.0.1\"/versionName \"$VER\"/" android/app/build.gradle

      # The expo release buildType signs with signingConfigs.debug, whose keystore
      # is gitignored — generate a THROWAWAY one (the APK is re-signed with the real
      # release keystore right after; this only satisfies validateSigningRelease).
      - name: Generate throwaway debug keystore
        run: |
          keytool -genkeypair -keystore android/app/debug.keystore \
            -storepass android -alias androiddebugkey -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            -keyalg RSA -keysize 2048 -validity 10000

      - name: Build release APK (Gradle)
        env:
          GRADLE_OPTS: -Xmx4g -Dorg.gradle.daemon=false
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleRelease --no-daemon

      # The expo-generated release buildType signs with the DEBUG keystore — re-sign
      # with the real release keystore (apksigner replaces the signing block).
      - name: Sign with the release keystore
        run: |
          BT="$ANDROID_HOME/build-tools/$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)"
          KS_PASS=$(jq -r '.android.keystore.keystorePassword' credentials.json)
          KEY_PASS=$(jq -r '.android.keystore.keyPassword' credentials.json)
          KEY_ALIAS=$(jq -r '.android.keystore.keyAlias' credentials.json)
          OUT="21pay-${{ github.ref_name }}.apk"
          cp android/app/build/outputs/apk/release/app-release.apk "$OUT"
          cp "$OUT" "21pay-latest.apk"
          "$BT/apksigner" sign \
            --ks credentials/release.keystore \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass "pass:$KS_PASS" \
            --key-pass "pass:$KEY_PASS" \
            "$OUT"
          "$BT/apksigner" verify --print-certs "$OUT" | head -3

      # On an apk-* tag, publish the APK as a GitHub Release (skipped for manual runs).
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/apk-')
        uses: softprops/action-gh-release@v2
        with:
          name: 21pay ${{ github.ref_name }}
          files: |
            21pay-${{ github.ref_name }}.apk
            21pay-latest.apk
          generate_release_notes: true
